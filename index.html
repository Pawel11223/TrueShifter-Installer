<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueShifter - Web Installer</title>
    <style>
        body {
            background-color: #121212; color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .container {
            background-color: #1e1e1e; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            max-width: 600px; border: 1px solid #333;
        }
        h1 { color: #ffffff; margin-top: 0; }
        p.subtitle { color: #aaaaaa; margin-bottom: 30px; }
        .boards-container {
            display: flex; justify-content: space-between; gap: 20px; margin-top: 20px;
        }
        .board-card {
            background: #2a2a2a; padding: 20px; border-radius: 8px; flex: 1;
            border-top: 4px solid #03a9f4; display: flex; flex-direction: column; align-items: center;
        }
        .board-card h3 { margin-top: 0; color: #fff; }
        .board-card p { font-size: 14px; color: #bbb; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TrueShifter Installer</h1>
        <p class="subtitle">Flash the Bridge firmware directly from your browser.</p>

        <div class="boards-container">
            <div class="board-card">
                <h3 style="color:green">BOARD 1</h3>
                <esp-web-install-button manifest="manifest1.json"></esp-web-install-button>
            </div>

            <div class="board-card">
                <h3 style="color:red;">BOARD 2</h3>
                <esp-web-install-button manifest="manifest2.json"></esp-web-install-button>
            </div>
        </div>
    </div>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
</body>
</html>
